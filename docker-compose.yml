services:
  wazuh-indexer:
    image: wazuh/wazuh-indexer:4.7.2
    container_name: wazuh-indexer
    restart: always
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    networks:
      soc-network:
        aliases:
          - wazuh.indexer

  wazuh-manager:
    image: wazuh/wazuh-manager:4.7.2
    container_name: my-wazuh-manager
    restart: always
    depends_on:
      - wazuh-indexer
    ports:
      - "1514:1514/udp"
      - "1515:1515"
      - "55000:55000"
    networks:
      soc-network:
        aliases:
          - wazuh.manager

  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:4.7.2
    container_name: wazuh-dashboard
    restart: always
    depends_on:
      - wazuh-manager
    ports:
      - "443:5601"
    environment:
      - WAZUH_MANAGER_URL=https://wazuh.manager
      - OPENSEARCH_HOSTS=https://wazuh.indexer:9200
    networks:
      - soc-network

networks:
  soc-network:
    driver: bridge
